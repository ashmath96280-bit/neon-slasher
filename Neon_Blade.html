<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON SLASHER : MOBILE & PC</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; color: #fff; cursor: none; touch-action: none; }
        canvas { display: block; }
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.95); z-index: 100; cursor: default; }
        h1 { font-size: clamp(2rem, 8vw, 4rem); text-shadow: 0 0 20px #0ff; margin: 0; color: #0ff; text-align: center; }
        .btn { padding: 15px 30px; margin: 10px; font-size: 1.1rem; background: transparent; border: 3px solid #0ff; color: #0ff; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .btn:active { background: #0ff; color: #000; }
        #hud { position: absolute; top: 10px; width: 100%; display: none; justify-content: space-between; padding: 0 15px; box-sizing: border-box; pointer-events: none; z-index: 50; font-size: 0.9rem; }
        #combo-ui { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: clamp(50px, 15vw, 100px); font-weight: bold; pointer-events: none; opacity: 0; text-shadow: 0 0 30px #f0f; z-index: 40; }
        .shop-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
        .swatch { width: 60px; height: 60px; border-radius: 50%; border: 3px solid #333; display: flex; align-items: center; justify-content: center; position: relative; }
        .swatch.selected { border-color: #fff; box-shadow: 0 0 15px #fff; }
        .swatch.locked::after { content: '🔒'; font-size: 12px; }
    </style>
</head>
<body>

    <div id="home-screen" class="screen">
        <h1>NEON SLASHER</h1>
        <p>BEST: <span id="high-score-val" style="color:#0ff">0</span> | <span id="home-coins">0</span> 🪙</p>
        <button class="btn" onclick="startGame()">JOUER</button>
        <button class="btn" onclick="openShop()">BOUTIQUE</button>
        <button class="btn" onclick="openSettings()" style="font-size: 0.8rem; opacity: 0.7;">PARAMÈTRES</button>
    </div>

    <div id="shop-menu" class="screen" style="display:none;">
        <h1>COLLECTION</h1>
        <div class="shop-grid" id="shop-items"></div>
        <button class="btn" onclick="closeShop()" style="margin-top:30px">RETOUR</button>
    </div>

    <div id="settings-screen" class="screen" style="display:none;">
        <h1>DATA</h1>
        <button class="btn" onclick="resetData()" style="border-color:red; color:red;">RESET TOUT</button>
        <button class="btn" onclick="closeSettings()">RETOUR</button>
    </div>

    <div id="hud">
        <div>SCORE: <span id="score">0</span></div>
        <div>BOMBES: <span id="bomb-count" style="color:red">0</span>/5</div>
        <div><span id="coins">0</span> 🪙</div>
    </div>
    <div id="combo-ui">X1</div>

    <div id="over-screen" class="screen" style="display:none;">
        <h1 style="color:red;">DECONNECTÉ</h1>
        <p id="final-stats"></p>
        <button class="btn" onclick="startGame()">REESSAYER</button>
        <button class="btn" onclick="backToHome()">MENU</button>
    </div>

    <canvas id="g"></canvas>

<script>
    const canvas = document.getElementById('g');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let score = 0, currentSessionCoins = 0, totalCoins = parseInt(localStorage.getItem('totalCoins')) || 0;
    let highScore = parseInt(localStorage.getItem('highScore')) || 0;
    let bombsHit = 0, gameActive = false, isSlicing = false, currentCombo = 0;
    let entities = [], particles = [], trail = [], mouse = { x: 0, y: 0, px: 0, py: 0 };
    let shake = 0, frenzy = false, bladeType = localStorage.getItem('bladeType') || 'cyan';
    let unlockedBlades = JSON.parse(localStorage.getItem('unlockedBlades')) || ['cyan'];

    function updateMenuStats() {
        document.getElementById('home-coins').innerText = totalCoins;
        document.getElementById('high-score-val').innerText = highScore;
    }
    updateMenuStats();

    // INPUTS (PC & MOBILE)
    function handleStart(x, y) { if(gameActive) { isSlicing = true; mouse.x = x; mouse.y = y; mouse.px = x; mouse.py = y; } }
    function handleMove(x, y) { mouse.px = mouse.x; mouse.py = mouse.y; mouse.x = x; mouse.y = y; if(isSlicing) trail.push({x: mouse.x, y: mouse.y}); }
    function handleEnd() { isSlicing = false; trail = []; document.getElementById('combo-ui').style.opacity = 0; currentCombo = 0; frenzy = false; }

    window.onmousedown = (e) => handleStart(e.clientX, e.clientY);
    window.onmousemove = (e) => handleMove(e.clientX, e.clientY);
    window.onmouseup = () => handleEnd();
    
    window.ontouchstart = (e) => handleStart(e.touches[0].clientX, e.touches[0].clientY);
    window.ontouchmove = (e) => { e.preventDefault(); handleMove(e.touches[0].clientX, e.touches[0].clientY); };
    window.ontouchend = () => handleEnd();

    function startGame() {
        gameActive = true; score = 0; currentSessionCoins = 0; bombsHit = 0; entities = []; particles = [];
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        document.getElementById('hud').style.display = 'flex';
        if(window.innerWidth > 768) document.body.style.cursor = "none";
    }

    function backToHome() {
        document.getElementById('over-screen').style.display = 'none';
        document.getElementById('home-screen').style.display = 'flex';
        updateMenuStats();
        document.body.style.cursor = "default";
    }

    function openSettings() { document.getElementById('home-screen').style.display = 'none'; document.getElementById('settings-screen').style.display = 'flex'; }
    function closeSettings() { document.getElementById('settings-screen').style.display = 'none'; document.getElementById('home-screen').style.display = 'flex'; }
    function resetData() { if(confirm("Supprimer toute ta progression ?")) { localStorage.clear(); location.reload(); } }

    function openShop() {
        document.getElementById('home-screen').style.display = 'none';
        document.getElementById('shop-menu').style.display = 'flex';
        const container = document.getElementById('shop-items');
        container.innerHTML = '';
        const BLADES = { cyan: { color: '#0ff', price: 0 }, pink: { color: '#f0f', price: 300 }, gold: { color: '#ffd700', price: 800 }, ghost: { color: '#444', price: 1500 }, rainbow: { color: 'rainbow', price: 3000 } };
        for (let key in BLADES) {
            let b = BLADES[key]; let isLocked = !unlockedBlades.includes(key);
            let div = document.createElement('div');
            div.className = `swatch ${isLocked ? 'locked' : ''} ${bladeType === key ? 'selected' : ''}`;
            div.style.background = b.color === 'rainbow' ? "linear-gradient(45deg, red, blue, green)" : b.color;
            div.onclick = () => {
                if (!isLocked) { bladeType = key; localStorage.setItem('bladeType', key); openShop(); }
                else if (totalCoins >= b.price) {
                    totalCoins -= b.price; unlockedBlades.push(key);
                    localStorage.setItem('totalCoins', totalCoins); localStorage.setItem('unlockedBlades', JSON.stringify(unlockedBlades));
                    openShop();
                }
            };
            container.appendChild(div);
        }
    }

    function closeShop() { document.getElementById('shop-menu').style.display = 'none'; document.getElementById('home-screen').style.display = 'flex'; }

    class Particle {
        constructor(x, y, color) {
            this.x = x; this.y = y; this.color = color;
            this.vx = (Math.random() - 0.5) * 12; this.vy = (Math.random() - 0.5) * 12;
            this.life = 1.0; this.size = Math.random() * 4 + 2;
        }
        update() { this.x += this.vx; this.y += this.vy; this.vy += 0.2; this.life -= 0.03; }
        draw() { ctx.globalAlpha = this.life; ctx.fillStyle = this.color; ctx.fillRect(this.x, this.y, this.size, this.size); ctx.globalAlpha = 1; }
    }

    class Entity {
        constructor(type) {
            this.type = type;
            this.x = Math.random() * (canvas.width - 100) + 50;
            this.y = canvas.height + 50;
            this.vx = (Math.random() - 0.5) * (frenzy ? 18 : 10);
            this.vy = -(Math.random() * 5 + (frenzy ? 20 : 16));
            this.radius = type === 'virus' ? 15 + Math.random() * 45 : 30;
            this.color = type === 'bomb' ? "#ff0000" : `hsl(${Math.random() * 360}, 100%, 70%)`;
            this.sides = type === 'virus' ? Math.floor(Math.random()*4)+3 : 0;
            this.angle = 0; this.rotSpeed = (Math.random() - 0.5) * 0.2;
        }
        update() { this.x += this.vx; this.vy += 0.3; this.y += this.vy; this.angle += this.rotSpeed; }
        draw() {
            ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle);
            ctx.shadowBlur = 10; ctx.shadowColor = this.color; ctx.strokeStyle = this.color; ctx.lineWidth = 3;
            ctx.beginPath();
            if(this.type === 'bomb') { ctx.arc(0,0, this.radius, 0, Math.PI*2); ctx.stroke(); ctx.moveTo(-10,-10); ctx.lineTo(10,10); }
            else { for(let i=0; i<this.sides; i++) { let a = (Math.PI*2/this.sides)*i; ctx.lineTo(Math.cos(a)*this.radius, Math.sin(a)*this.radius); } }
            ctx.closePath(); ctx.stroke(); ctx.restore();
        }
    }

    function loop() {
        if (shake > 0) { ctx.save(); ctx.translate(Math.random()*shake - shake/2, Math.random()*shake - shake/2); shake *= 0.9; }
        ctx.fillStyle = frenzy ? "rgba(40,0,40,1)" : "black"; ctx.fillRect(0,0, canvas.width, canvas.height);

        if(gameActive) {
            if(Math.random() < (frenzy ? 0.18 : 0.07)) entities.push(new Entity(Math.random() < 0.15 ? 'bomb' : 'virus'));
            let c = (bladeType === 'rainbow') ? `hsl(${Date.now() % 360}, 100%, 70%)` : (bladeType === 'ghost' ? '#444' : (bladeType === 'pink' ? '#f0f' : (bladeType === 'gold' ? '#ffd700' : '#0ff')));
            if(isSlicing && trail.length > 1) {
                ctx.shadowBlur = 15; ctx.shadowColor = c; ctx.strokeStyle = c; ctx.lineWidth = 8;
                ctx.beginPath(); ctx.moveTo(trail[0].x, trail[0].y);
                for(let i=1; i<trail.length; i++) ctx.lineTo(trail[i].x, trail[i].y);
                ctx.stroke(); if(trail.length > 8) trail.shift();
            }

            for(let i = entities.length-1; i>=0; i--) {
                let e = entities[i]; e.update(); e.draw();
                let d = Math.hypot(mouse.x - e.x, mouse.y - e.y);
                if(isSlicing && d < e.radius + 20) {
                    if(e.type === 'bomb') {
                        bombsHit++; entities.splice(i, 1); shake = 15;
                        if(bombsHit >= 5) {
                            gameActive = false; totalCoins += currentSessionCoins;
                            if(score > highScore) { highScore = score; localStorage.setItem('highScore', highScore); }
                            localStorage.setItem('totalCoins', totalCoins);
                            document.getElementById('final-stats').innerHTML = `SCORE: ${score}<br>PIÈCES: ${currentSessionCoins}`;
                            document.getElementById('over-screen').style.display = 'flex';
                            document.body.style.cursor = "default";
                        }
                    } else {
                        for(let p=0; p<10; p++) particles.push(new Particle(e.x, e.y, e.color));
                        entities.splice(i, 1); currentCombo++; score += 100 * currentCombo; currentSessionCoins++;
                        if(currentCombo >= 10) frenzy = true; shake = e.radius / 6;
                        document.getElementById('score').innerText = score; document.getElementById('coins').innerText = currentSessionCoins;
                        document.getElementById('bomb-count').innerText = bombsHit;
                        const cUi = document.getElementById('combo-ui');
                        cUi.innerText = "X"+currentCombo; cUi.style.opacity = 1;
                    }
                }
                if(e.y > canvas.height + 100) entities.splice(i, 1);
            }
        }
        for(let i = particles.length-1; i>=0; i--) { particles[i].update(); particles[i].draw(); if(particles[i].life <= 0) particles.splice(i, 1); }
        if (shake > 0.1) ctx.restore();
        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
